<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Xiaomi Redmi Watch 5, 5 active y 5 lite.</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="barra"></div>
    <br>
    <h1 class="titulo">Imanes de nevera intercambiables.</h1>
    <br>
    <div class="contenido">
        <div class="galeria">
            <div class="visor">
                <img id="imagenPrincipal" src="../Imagenes/Modelos/iman_nevera_intercambiable/Puesto.jpeg" alt="Visor">
            </div>

            <div class="miniaturas">
                <img src="../Imagenes/Modelos/iman_nevera_intercambiable/Puesto.jpeg" onclick="seleccionar(this)" class="thumb activa">
                <img src="../Imagenes/Modelos/iman_nevera_intercambiable/Mano.jpeg" onclick="seleccionar(this)" class="thumb">
                <img src="../Imagenes/Modelos/iman_nevera_intercambiable/Base.jpeg" onclick="seleccionar(this)" class="thumb">
            </div>
        </div>
        <br>
        <div class="descripcion">
            <h2>Descripción del producto:</h2>
            <h3>Imán de nevera intercambiable con una parte fija a la nevera y otra intercambiable con una rosca.(Se necesitan imanes de 1cm X 0.5cm).</h3>
        </div>
        <div class="descarga">
            <label for="opciones">Archivos:</label>
            <select id="opciones" name="lista_desplegable">
                <!-- AQUÍ PONES LAS RUTAS DE TUS ARCHIVOS STL O ZIP -->
                <option value="../Archivos/Soporte_Mi_Watch_5/Base.3mf">Base alta</option>
                <option value="../Archivos/Soporte_Mi_Watch_5/Cabeza.3mf">Cabeza</option>
                <option value="../Archivos/Soporte_Mi_Watch_5/Base_tumbada.3mf">Base tumbada</option>
                <option value="../Archivos/Soporte_Mi_Watch_5/Todo.zip">Todo</option>
            </select>
            <!-- He cambiado el type="submit" por "button" para que no recargue la página -->
            <button type="button" onclick="descargarArchivo()">Descargar</button>
        </div>
    </div>
    <br>
    <a href="../Creadores/o3d-print.html">
        <div class="autor">
            <img src="../Imagenes/Usuarios/O3D-Print.PNG" alt="">
            <p>Hecho por O3D-Print</p>
        </div></a>
    <br>
    <script>
        // Función para la descarga
        function descargarArchivo() {
            const lista = document.getElementById('opciones');
            const ruta = lista.value;
            
            const link = document.createElement('a');
            link.href = ruta;
            link.download = ''; // Esto fuerza la descarga
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function seleccionar(elemento) {
            document.getElementById('imagenPrincipal').src = elemento.src;
            const todas = document.querySelectorAll('.thumb');
            todas.forEach(t => t.classList.remove('activa'));
            elemento.classList.add('activa');
        }

        const div = document.getElementById("barra");
        fetch("barra.html")
            .then(response => response.text())
            .then(data => {
                div.innerHTML = data;
            })
            .catch(error => console.error("Error loading barra.html:", error));
    </script>
</body>
</html>
