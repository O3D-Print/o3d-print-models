// --- LÓGICA DE FILTRADO ---
function filtrarModelos() {
    // 1. Obtener el término de la URL (ej: modelos.html#soporte)
    const hash = decodeURIComponent(window.location.hash.substring(1)).toLowerCase();
    
    // 2. Seleccionar todos los contenedores de modelos
    const modelos = document.querySelectorAll('.modelo');
    const busqueda = document.querySelectorAll('.busqueda')[0];

    if (hash) {
        modelos.forEach(modelo => {
            // Buscamos dentro del ID o del H2 del modelo
            const nombreModelo = modelo.querySelector('h2').innerText.toLowerCase();
            const idModelo = modelo.id.toLowerCase();

            if (hash === "todos") {
                modelo.style.display = "block"; // Mostrar todos si se busca "todos"
                busqueda.style.display = "none"; // Ocultar el texto de búsqueda
            } else if (nombreModelo.includes(hash) || idModelo.includes(hash)) {
                     modelo.style.display = "block"; // Mostrar si coincide
                 } else {
                     modelo.style.display = "none";  // Ocultar si no coincide
                 }
        });
    }
}

// Ejecutar al cargar la página
window.addEventListener('load', filtrarModelos);
// Ejecutar si el usuario busca algo estando ya dentro de modelos.html
window.addEventListener('hashchange', filtrarModelos);

let palabra = window.location.hash.substring(1);

palabra = decodeURIComponent(palabra);

document.getElementById("textoBuscado").innerText = '"' + palabra + '"';

    </script>
